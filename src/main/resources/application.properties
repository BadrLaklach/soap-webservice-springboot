# Configuration Spring Boot — DevoirSoap avec H2

server.port=8080
spring.application.name=DevoirSoap

# ---------------------------------------------------------------
# H2 — Base de données embarquée
# ---------------------------------------------------------------

# Mode in-memory : les données sont perdues à l'arrêt du serveur
spring.datasource.url=jdbc:h2:mem:etudiantdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web H2 accessible à : http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------

# Crée/recrée le schéma à chaque démarrage, puis exécute data.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
# IMPORTANT: force Hibernate à créer les tables AVANT que data.sql soit exécuté
spring.jpa.defer-datasource-initialization=true

# Dialecte H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Afficher les requêtes SQL dans les logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# Logs SOAP
# ---------------------------------------------------------------
logging.level.org.springframework.ws=DEBUG
